<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, Special One! ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Background Animation Canvas -->
    <canvas id="ambient-canvas"></canvas>

    <!-- Music Controller -->
    <div class="music-container">
        <!-- REPLACE 'birthday-music.mp3' WITH YOUR OWN AUDIO FILE LINK -->
        <audio id="bg-music" loop>
            <source src="birthday-music.mp3" type="audio/mpeg">
        </audio>
        <button id="music-toggle" class="music-btn">🎵 Play Music</button>
    </div>

    <!-- Main Container for 3D perspective -->
    <main class="wrapper">
        
        <!-- The 3D Interactive Card -->
        <div class="card-3d" id="birthday-card">
            <div class="card-glow"></div>
            
            <div class="card-content">
                <div class="sparkles">✨ ✨ ✨</div>
                <h1 class="glow-text">Happy Birthday</h1>
                <h2 class="name-text">To Someone Special ❤️</h2>
                
                <p class="message">
                    On this beautiful day, I want to remind you how incredibly bright you make the world. May your year ahead be as beautiful, kind, and extraordinary as you are.
                </p>

                <div class="gift-box" onclick="burstConfetti()">
                    🎁 <span class="tap-hint">Tap to open joy</span>
                </div>
            </div>
        </div>

    </main>

    <!-- JavaScript for 3D tilt, Music, and Particles -->
    <script>
        // 1. Audio Controller Logic
        const music = document.getElementById('bg-music');
        const musicBtn = document.getElementById('music-toggle');

        musicBtn.addEventListener('click', () => {
            if (music.paused) {
                music.play().catch(e => console.log("Audio play blocked by browser. Click again."));
                musicBtn.textContent = "⏸️ Pause Music";
                musicBtn.classList.add('playing');
            } else {
                music.pause();
                musicBtn.textContent = "🎵 Play Music";
                musicBtn.classList.remove('playing');
            }
        });

        // 2. Realistic 3D Tilt Effect
        const card = document.getElementById('birthday-card');
        const wrapper = document.querySelector('.wrapper');

        wrapper.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 15;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 15;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        wrapper.addEventListener('mouseenter', () => {
            card.style.transition = 'none';
        });

        wrapper.addEventListener('mouseleave', () => {
            card.style.transition = 'transform 0.5s ease, box-shadow 0.5s ease';
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        // 3. Realistic Background Particles & Floating Balloons Canvas
        const canvas = document.getElementById('ambient-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const particles = [];
        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = Math.random() * 4 + 1;
                this.speed = Math.random() * 1 + 0.5;
                this.alpha = Math.random() * 0.5 + 0.2;
                this.hue = Math.random() * 40 + 330; // Soft pinks, purples, and gold
            }
            update() {
                this.y -= this.speed;
                if (this.y < -10) this.reset();
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 75%, 1)`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = `hsla(${this.hue}, 100%, 75%, 1)`;
                ctx.fill();
                ctx.restore();
            }
        }

        for (let i = 0; i < 60; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // Extra dynamic confetti burst on box click
        function burstConfetti() {
            for (let i = 0; i < 20; i++) {
                let p = new Particle();
                p.y = canvas.height / 2 + (Math.random() * 200 - 100);
                p.x = canvas.width / 2 + (Math.random() * 200 - 100);
                p.speed = Math.random() * 5 + 2;
                p.size = Math.random() * 6 + 3;
                particles.push(p);
            }
        }
    </script>
</body>
</html>
